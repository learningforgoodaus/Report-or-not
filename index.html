<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Report or Not?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #f6f5f8;
            color: #413659;
            overscroll-behavior-y: contain;
        }

        /* --- DESKTOP STYLES --- */
        .drop-zone {
            transition: all 0.3s ease;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-width: 4px;
        }

        .drop-zone.drag-over {
            background-color: #f0ebf7 !important;
            border-color: #513873 !important;
            transform: scale(1.01);
        }

        .scenario-card {
            cursor: grab;
            transition: transform 0.2s ease, background-color 0.3s ease;
            font-size: 0.95rem;
            user-select: none;
            width: 100%;
        }

        .scenario-card:active { cursor: grabbing; }

        .card-correct { 
            background-color: #dcfce7 !important; 
            border: 2px solid #22c55e !important; 
            color: #166534 !important;
            font-weight: bold;
        }
        .card-incorrect { 
            background-color: #fee2e2 !important; 
            border: 2px solid #ef4444 !important; 
            color: #991b1b !important;
            font-weight: bold;
        }

        /* --- INTERFACE TOGGLES --- */
        #mobile-interface { display: none; }
        #desktop-interface { display: block; }

        @media (max-width: 767px) {
            #desktop-interface { display: none !important; }
            #mobile-interface { display: flex; flex-direction: column; align-items: center; width: 100%; }
        }

        /* --- MOBILE STACK STYLES --- */
        .stack-area { position: relative; width: 100%; height: 320px; margin-top: 1rem; }
        .swipe-card {
            position: absolute;
            width: 90%; left: 5%; height: 260px;
            background: white; border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; text-align: center; font-weight: 600;
            border: 2px solid #e5e7eb; touch-action: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="game-container" class="max-w-4xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-bold text-[#513873] mb-2">Report or Not?</h1>
            <p class="text-sm text-[#413659] mb-4 font-medium italic">
                <span class="hidden md:inline">Drag scenarios into the correct box.</span>
                <span class="md:hidden">Swipe Left for No Report, Right for Report Required.</span>
            </p>
        </header>

        <div id="desktop-interface">
            <div id="scenarios-pool" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10 min-h-[100px]"></div>
            
            <div class="grid grid-cols-2 gap-8">
                <div id="zone-report" class="drop-zone border-dashed border-[#513873] rounded-2xl p-6 bg-white shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <div class="bg-[#513873] text-white px-4 py-1 rounded-full text-[10px] font-bold mb-4 uppercase tracking-widest pointer-events-none">Report Required</div>
                    <div class="zone-content w-full flex flex-col gap-3"></div>
                </div>

                <div id="zone-no-report" class="drop-zone border-dashed border-[#9C7F9D] rounded-2xl p-6 bg-white shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <div class="bg-[#9C7F9D] text-white px-4 py-1 rounded-full text-[10px] font-bold mb-4 uppercase tracking-widest pointer-events-none">No Report Needed</div>
                    <div class="zone-content w-full flex flex-col gap-3"></div>
                </div>
            </div>
        </div>

        <div id="mobile-interface">
            <div class="stack-area" id="card-stack"></div>
            
            <div class="grid grid-cols-2 w-full gap-4 mt-6 border-t border-gray-200 pt-6">
                <div class="text-center">
                    <p class="text-[10px] font-black text-[#9C7F9D] uppercase tracking-widest mb-1">← SWIPE LEFT</p>
                    <p class="text-[14px] font-bold text-[#413659]">No Report</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] font-black text-[#513873] uppercase tracking-widest mb-1">SWIPE RIGHT →</p>
                    <p class="text-[14px] font-bold text-[#513873]">Report Required</p>
                </div>
            </div>
        </div>

        <div class="mt-12 text-center">
            <button onclick="resetActivity()" class="bg-[#413659] hover:bg-[#513873] text-white font-bold py-3 px-12 rounded-xl transition-all shadow-md active:scale-95">
                Reset Activity
            </button>
        </div>
    </div>

    <div id="summary-view" class="max-w-2xl mx-auto hidden bg-white p-8 rounded-2xl shadow-xl mt-10 border border-gray-100">
        <h2 class="text-2xl font-bold text-[#513873] mb-6 text-center">Final Results</h2>
        <div id="results-list" class="space-y-4 mb-8"></div>
        <button onclick="resetActivity()" class="w-full bg-[#513873] text-white font-bold py-4 rounded-xl shadow-lg">Restart Activity</button>
    </div>

    <script>
        const scenarios = [
            { id: 1, text: "A family member makes threats at the workplace counter.", category: "report" },
            { id: 2, text: "An employee asks for 10 days of paid domestic violence leave.", category: "report" },
            { id: 3, text: "Abusive text messages are sent to a work phone.", category: "report" },
            { id: 4, text: "A colleague says they are 'having a hard time' (no risks).", category: "no-report" },
            { id: 5, text: "You hear a rumour that someone is experiencing violence.", category: "no-report" },
            { id: 6, text: "Staff member talks about a past event that is resolved.", category: "no-report" }
        ];

        let results = [];

        function init() {
            const pool = document.getElementById('scenarios-pool');
            const stack = document.getElementById('card-stack');
            const summary = document.getElementById('summary-view');
            const game = document.getElementById('game-container');
            
            pool.innerHTML = ''; stack.innerHTML = ''; results = [];
            summary.classList.add('hidden'); game.classList.remove('hidden');
            document.querySelectorAll('.zone-content').forEach(z => z.innerHTML = '');

            const shuffled = [...scenarios].sort(() => Math.random() - 0.5);

            shuffled.forEach((s, i) => {
                // Desktop Creation
                const card = document.createElement('div');
                card.id = `card-${s.id}`;
                card.className = "scenario-card bg-white p-4 rounded-xl shadow-sm border border-gray-200 text-center font-semibold text-[#413659]";
                card.draggable = true;
                card.innerText = s.text;
                card.dataset.category = s.category;
                card.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', e.target.id));
                pool.appendChild(card);

                // Mobile Creation
                const mCard = document.createElement('div');
                mCard.className = "swipe-card";
                mCard.innerText = s.text;
                mCard.style.zIndex = scenarios.length - i;
                stack.appendChild(mCard);
                setupSwipe(mCard, s);
            });
        }

        // --- DESKTOP HANDLERS ---
        function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        
        function drop(e) {
            e.preventDefault();
            const zone = e.currentTarget;
            zone.classList.remove('drag-over');
            
            const cardId = e.dataTransfer.getData('text/plain');
            const card = document.getElementById(cardId);
            if (!card) return;

            const zoneType = zone.id === 'zone-report' ? 'report' : 'no-report';
            const correctCategory = card.dataset.category;
            const isCorrect = zoneType === correctCategory;

            zone.querySelector('.zone-content').appendChild(card);
            card.draggable = false;
            card.classList.remove('bg-white', 'border-gray-200');
            card.classList.add(isCorrect ? 'card-correct' : 'card-incorrect');
            
            results.push({ text: card.innerText, isCorrect, category: correctCategory });
            if (results.length === scenarios.length) setTimeout(showSummary, 1000);
        }

        // --- MOBILE HANDLERS ---
        function setupSwipe(el, data) {
            let startX = 0, currentX = 0;
            el.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; el.style.transition = 'none'; });
            el.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX - startX;
                const rotation = currentX / 15;
                el.style.transform = `translateX(${currentX}px) rotate(${rotation}deg)`;
                
                const dir = currentX > 0 ? 'report' : 'no-report';
                if (Math.abs(currentX) > 40) {
                    el.style.backgroundColor = (dir === data.category) ? '#dcfce7' : '#fee2e2';
                }
            });
            el.addEventListener('touchend', () => {
                const dir = currentX > 0 ? 'report' : 'no-report';
                if (Math.abs(currentX) > 100 && dir === data.category) {
                    el.style.transition = 'all 0.4s ease-out';
                    el.style.transform = `translateX(${currentX * 4}px) rotate(${currentX / 5}deg)`;
                    setTimeout(() => { el.remove(); handleResult(data, true); }, 300);
                } else {
                    el.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    el.style.transform = 'translateX(0) rotate(0)';
                    el.style.backgroundColor = 'white';
                }
                currentX = 0;
            });
        }

        function handleResult(data, isCorrect) {
            results.push({ text: data.text, isCorrect, category: data.category });
            if (results.length === scenarios.length) showSummary();
        }

        function showSummary() {
            document.getElementById('game-container').classList.add('hidden');
            const view = document.getElementById('summary-view');
            const list = document.getElementById('results-list');
            view.classList.remove('hidden');
            list.innerHTML = results.map(res => `
                <div class="p-4 rounded-xl bg-gray-50 border-l-4 ${res.isCorrect ? 'border-green-500' : 'border-red-500'} shadow-sm">
                    <p class="font-bold text-sm text-gray-800">${res.text}</p>
                    <p class="text-[10px] mt-1 uppercase font-black text-gray-400">Correct Category: ${res.category.replace('-', ' ')}</p>
                </div>
            `).join('');
        }

        function resetActivity() { init(); }
        window.onload = init;
    </script>
</body>
</html>
