<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Report or Not?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #513873;
            --secondary: #9C7F9D;
            --success: #22c55e;
            --error: #ef4444;
            --bg-light: #f6f5f8;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            color: #413659;
            overscroll-behavior-y: contain;
        }

        /* DESKTOP DRAG & DROP */
        .drop-zone { transition: all 0.3s ease; min-height: 140px; }
        .drop-zone.drag-over { background-color: #C6B4D9; transform: scale(1.02); border-style: solid; }

        /* MOBILE SWIPE CARD STACK */
        #mobile-game-container { display: none; }
        
        @media (max-width: 767px) {
            #desktop-game-container { display: none; }
            #mobile-game-container { display: flex; flex-direction: column; align-items: center; }
        }

        .stack-area {
            position: relative;
            width: 100%;
            height: 320px;
            margin-top: 10px;
        }

        .swipe-card {
            position: absolute;
            width: 90%;
            left: 5%;
            height: 260px;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            border: 2px solid #e5e7eb;
            touch-action: none;
            user-select: none;
            z-index: 10;
        }

        .summary-item { border-left: 5px solid; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="main-wrapper" class="max-w-4xl mx-auto">
        
        <header class="text-center mb-6">
            <h1 class="text-2xl md:text-4xl font-bold text-[#513873] mb-2">Report or Not?</h1>
            <p id="instruction-text" class="text-sm md:text-base text-gray-600 font-medium italic"></p>
        </header>

        <div id="desktop-game-container">
            <div id="desktop-pool" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"></div>
            
            <div class="grid grid-cols-2 gap-8">
                <div id="zone-no-report" class="drop-zone border-4 border-dashed border-[#9C7F9D] rounded-2xl p-6 flex flex-col items-center bg-white shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <div class="bg-[#9C7F9D] text-white px-4 py-1 rounded-full text-xs font-bold mb-4 uppercase tracking-widest">No Report</div>
                    <div class="zone-content w-full flex flex-col gap-3"></div>
                </div>
                <div id="zone-report" class="drop-zone border-4 border-dashed border-[#513873] rounded-2xl p-6 flex flex-col items-center bg-white shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <div class="bg-[#513873] text-white px-4 py-1 rounded-full text-xs font-bold mb-4 uppercase tracking-widest">Report Required</div>
                    <div class="zone-content w-full flex flex-col gap-3"></div>
                </div>
            </div>
        </div>

        <div id="mobile-game-container" class="w-full">
            <div class="stack-area">
                <div id="card-stack" class="w-full h-full relative"></div>
            </div>
            
            <div class="flex justify-between w-full px-4 mt-2">
                <div class="flex flex-col items-center w-1/2">
                    <span class="text-[12px] font-black text-[#9C7F9D] uppercase tracking-tighter">← SWIPE LEFT</span>
                    <span class="text-[14px] font-bold text-[#9C7F9D]">No Report</span>
                </div>
                <div class="flex flex-col items-center w-1/2">
                    <span class="text-[12px] font-black text-[#513873] uppercase tracking-tighter">SWIPE RIGHT →</span>
                    <span class="text-[14px] font-bold text-[#513873]">Report Required</span>
                </div>
            </div>
        </div>

        <div id="summary-view" class="hidden">
            <div class="bg-white rounded-3xl p-6 shadow-xl border border-gray-100">
                <h2 class="text-2xl font-bold text-[#513873] mb-6 text-center">Results Summary</h2>
                <div id="results-list" class="space-y-3 mb-8"></div>
                <button onclick="location.reload()" class="w-full bg-[#513873] text-white font-bold py-4 rounded-2xl shadow-lg">Restart Activity</button>
            </div>
        </div>
    </div>

    <script>
        const scenarios = [
            { id: 1, text: "A family member makes threats at the workplace counter.", category: "report" },
            { id: 2, text: "An employee asks for 10 days of paid domestic violence leave.", category: "report" },
            { id: 3, text: "Abusive text messages are sent to a work phone.", category: "report" },
            { id: 4, text: "A colleague says they are 'having a hard time' (no risks).", category: "no-report" },
            { id: 5, text: "You hear a rumour that someone is experiencing violence.", category: "no-report" },
            { id: 6, text: "Staff member talks about a past event that is resolved.", category: "no-report" }
        ];

        let results = [];
        const isMobile = window.innerWidth < 768;

        function init() {
            const pool = document.getElementById('desktop-pool');
            const stack = document.getElementById('card-stack');
            const instructions = document.getElementById('instruction-text');
            
            instructions.innerText = isMobile 
                ? "Swipe the card to the correct side." 
                : "Drag and drop the cards into the correct category.";

            const shuffled = [...scenarios].sort(() => Math.random() - 0.5);

            shuffled.forEach((s, i) => {
                const dCard = document.createElement('div');
                dCard.id = `d-${s.id}`;
                dCard.className = "bg-white p-4 rounded-xl shadow border border-gray-100 text-center font-medium cursor-grab active:grabbing";
                dCard.draggable = true;
                dCard.innerText = s.text;
                dCard.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', s.id));
                pool.appendChild(dCard);

                const mCard = document.createElement('div');
                mCard.className = "swipe-card";
                mCard.innerText = s.text;
                mCard.style.zIndex = scenarios.length - i;
                stack.appendChild(mCard);
                setupSwipe(mCard, s);
            });
        }

        function setupSwipe(el, data) {
            let startX = 0, currentX = 0;

            el.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                el.style.transition = 'none';
            });

            el.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX - startX;
                const rotation = currentX / 15;
                el.style.transform = `translateX(${currentX}px) rotate(${rotation}deg)`;
                
                const swipedDirection = currentX > 0 ? 'report' : 'no-report';
                const isCorrectPath = swipedDirection === data.category;

                if (Math.abs(currentX) > 20) {
                    if (isCorrectPath) {
                        el.style.backgroundColor = '#f0fdf4'; // Light Green
                        el.style.borderColor = '#22c55e';
                    } else {
                        el.style.backgroundColor = '#fef2f2'; // Light Red
                        el.style.borderColor = '#ef4444';
                    }
                }
            });

            el.addEventListener('touchend', () => {
                const swipedDirection = currentX > 0 ? 'report' : 'no-report';
                const isCorrectPath = swipedDirection === data.category;

                // Threshold met and correct direction
                if (Math.abs(currentX) > 100 && isCorrectPath) {
                    el.style.transition = 'all 0.4s ease-out';
                    el.style.transform = `translateX(${currentX * 4}px) rotate(${currentX / 5}deg)`;
                    el.style.opacity = '0';
                    setTimeout(() => el.remove(), 400);
                    handlePlacement(data.id, swipedDirection);
                } else {
                    // Snap back if wrong direction or threshold not met
                    el.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s';
                    el.style.transform = 'translateX(0) rotate(0)';
                    el.style.backgroundColor = 'white';
                    el.style.borderColor = '#e5e7eb';
                }
                currentX = 0;
            });
        }

        // DESKTOP DRAG HANDLERS
        function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function drop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const id = e.dataTransfer.getData('text');
            const zone = e.currentTarget.id === 'zone-report' ? 'report' : 'no-report';
            handlePlacement(parseInt(id), zone);
        }

        function handlePlacement(id, userChoice) {
            const scenario = scenarios.find(s => s.id === id);
            const isCorrect = scenario.category === userChoice;
            
            // On desktop, we still track if they dropped it in the wrong box
            results.push({ ...scenario, isCorrect, userChoice });

            const dEl = document.getElementById(`d-${id}`);
            if (dEl) dEl.remove();

            if (results.length === scenarios.length) {
                setTimeout(showSummary, 500);
            }
        }

        function showSummary() {
            document.getElementById('desktop-game-container').style.display = 'none';
            document.getElementById('mobile-game-container').style.display = 'none';
            document.getElementById('instruction-text').style.display = 'none';
            
            const view = document.getElementById('summary-view');
            const list = document.getElementById('results-list');
            view.classList.remove('hidden');

            list.innerHTML = results.map(res => `
                <div class="summary-item p-4 rounded-xl ${res.isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}">
                    <p class="text-sm font-bold">${res.text}</p>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-[10px] uppercase font-bold text-gray-500">Result: ${res.category.replace('-', ' ')}</span>
                        <span class="font-black text-xs ${res.isCorrect ? 'text-green-600' : 'text-red-600'}">
                            ${res.isCorrect ? 'PASSED ✓' : 'MISSED ✕'}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
