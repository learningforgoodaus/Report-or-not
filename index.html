<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Report or Not? Activity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        :root {
            --primary: #513873;
            --secondary: #C6B4D9;
            --success: #22c55e;
            --error: #ef4444;
            --bg-light: #F2F2F2;
            --text-dark: #413659;
            --border-color: #E5E7EB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            overscroll-behavior-y: contain;
        }

        .main-card {
            width: 100%;
            max-width: 800px;
            background-color: #FFF;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        /* --- DESKTOP VIEW (PC) --- */
        #desktop-game-container { display: block; }
        .drop-zone {
            transition: all 0.3s ease;
            min-height: 160px;
            border-width: 2px;
        }
        .drop-zone.drag-over {
            background-color: #F9F7FC;
            border-color: var(--primary);
            transform: scale(1.01);
        }

        /* --- MOBILE VIEW (Phone/Tablet) --- */
        #mobile-game-container { display: none; }
        
        @media (max-width: 767px) {
            #desktop-game-container { display: none !important; }
            #mobile-game-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
            .main-card { padding: 1.25rem; }
        }

        .stack-area {
            position: relative;
            width: 100%;
            height: 340px;
            margin: 1.5rem 0;
        }

        .swipe-card {
            position: absolute;
            width: 100%;
            height: 280px;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.5;
            border: 1px solid var(--border-color);
            touch-action: none;
            user-select: none;
            z-index: 10;
        }

        .summary-item { border-left-width: 6px; }
    </style>
</head>
<body>

    <div class="main-card">
        <header class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-[#513873] mb-3">Report or Not?</h1>
            <div class="h-1 w-20 bg-[#C6B4D9] mx-auto mb-4 rounded-full"></div>
            <p id="instruction-text" class="text-sm md:text-base text-gray-500 font-medium italic"></p>
        </header>

        <div id="desktop-game-container">
            <div id="desktop-pool" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-10"></div>
            
            <div class="grid grid-cols-2 gap-6">
                <div id="zone-no-report" class="drop-zone border-2 border-dashed border-gray-300 rounded-xl p-5 flex flex-col items-center bg-gray-50" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-4">No Report Needed</span>
                    <div class="zone-content w-full flex flex-col gap-3"></div>
                </div>
                <div id="zone-report" class="drop-zone border-2 border-dashed border-gray-300 rounded-xl p-5 flex flex-col items-center bg-gray-50" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-4">Report Required</span>
                    <div class="zone-content w-full flex flex-col gap-3"></div>
                </div>
            </div>
        </div>

        <div id="mobile-game-container">
            <div class="stack-area">
                <div id="card-stack" class="w-full h-full relative"></div>
            </div>
            
            <div class="grid grid-cols-2 w-full gap-4 pt-4 border-t border-gray-100">
                <div class="text-center">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-1">← SWIPE LEFT</p>
                    <p class="text-[13px] font-bold text-[#413659]">No Report</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-1">SWIPE RIGHT →</p>
                    <p class="text-[13px] font-bold text-[#513873]">Report Required</p>
                </div>
            </div>
        </div>

        <div id="summary-view" class="hidden">
            <div class="border-t border-gray-100 pt-2">
                <div id="results-list" class="space-y-4 mb-8"></div>
                <button onclick="location.reload()" class="w-full bg-[#513873] text-white font-bold py-4 rounded-xl shadow-md hover:bg-[#413659]">
                    Restart Activity
                </button>
            </div>
        </div>
    </div>

    <script>
        const scenarios = [
            { id: 1, text: "A family member makes threats at the workplace counter.", category: "report" },
            { id: 2, text: "An employee asks for 10 days of paid domestic violence leave.", category: "report" },
            { id: 3, text: "Abusive text messages are sent to a work phone.", category: "report" },
            { id: 4, text: "A colleague says they are 'having a hard time' (no risks).", category: "no-report" },
            { id: 5, text: "You hear a rumour that someone is experiencing violence.", category: "no-report" },
            { id: 6, text: "Staff member talks about a past event that is resolved.", category: "no-report" }
        ];

        let results = [];

        function init() {
            const pool = document.getElementById('desktop-pool');
            const stack = document.getElementById('card-stack');
            const instructions = document.getElementById('instruction-text');
            const isMobile = window.innerWidth < 768;
            
            instructions.innerText = isMobile 
                ? "Swipe the cards left or right to categorize." 
                : "Drag scenarios into the correct category below.";

            const shuffled = [...scenarios].sort(() => Math.random() - 0.5);

            shuffled.forEach((s, i) => {
                // DESKTOP: Only inject if container is visible
                const dCard = document.createElement('div');
                dCard.id = `d-${s.id}`;
                dCard.className = "bg-white p-4 rounded-lg shadow-sm border border-gray-200 text-sm font-semibold text-center cursor-grab active:grabbing";
                dCard.draggable = true;
                dCard.innerText = s.text;
                dCard.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', s.id));
                pool.appendChild(dCard);

                // MOBILE: Swipe logic
                const mCard = document.createElement('div');
                mCard.className = "swipe-card";
                mCard.innerText = s.text;
                mCard.style.zIndex = scenarios.length - i;
                stack.appendChild(mCard);
                setupSwipe(mCard, s);
            });
        }

        // --- MOBILE SWIPE LOGIC ---
        function setupSwipe(el, data) {
            let startX = 0, currentX = 0;
            el.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                el.style.transition = 'none';
            });
            el.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX - startX;
                const rotation = currentX / 18;
                el.style.transform = `translateX(${currentX}px) rotate(${rotation}deg)`;
                
                const dir = currentX > 0 ? 'report' : 'no-report';
                if (Math.abs(currentX) > 30) {
                    if (dir === data.category) {
                        el.style.backgroundColor = '#F0FDF4'; // Green
                        el.style.borderColor = '#22C55E';
                    } else {
                        el.style.backgroundColor = '#FEF2F2'; // Red
                        el.style.borderColor = '#EF4444';
                    }
                }
            });
            el.addEventListener('touchend', () => {
                const dir = currentX > 0 ? 'report' : 'no-report';
                if (Math.abs(currentX) > 110 && dir === data.category) {
                    el.style.transition = 'all 0.5s ease-out';
                    el.style.transform = `translateX(${currentX * 4}px) rotate(${currentX / 4}deg)`;
                    el.style.opacity = '0';
                    setTimeout(() => el.remove(), 400);
                    handlePlacement(data.id, dir);
                } else {
                    el.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s';
                    el.style.transform = 'translateX(0) rotate(0)';
                    el.style.backgroundColor = 'white';
                    el.style.borderColor = '#E5E7EB';
                }
                currentX = 0;
            });
        }

        // --- DESKTOP DRAG LOGIC ---
        function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function drop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const id = e.dataTransfer.getData('text');
            const zone = e.currentTarget.id === 'zone-report' ? 'report' : 'no-report';
            handlePlacement(parseInt(id), zone);
        }

        function handlePlacement(id, choice) {
            const s = scenarios.find(item => item.id === id);
            results.push({ ...s, isCorrect: s.category === choice, userChoice: choice });
            const dEl = document.getElementById(`d-${id}`);
            if (dEl) dEl.remove();
            if (results.length === scenarios.length) setTimeout(showSummary, 400);
        }

        function showSummary() {
            document.getElementById('desktop-game-container').style.display = 'none';
            document.getElementById('mobile-game-container').style.display = 'none';
            document.getElementById('instruction-text').innerText = "Review your activity results.";
            const view = document.getElementById('summary-view');
            const list = document.getElementById('results-list');
            view.classList.remove('hidden');
            list.innerHTML = results.map(res => `
                <div class="summary-item p-4 rounded-lg bg-white shadow-sm border border-gray-100 ${res.isCorrect ? 'border-l-green-500' : 'border-l-red-500'}">
                    <p class="text-[13px] font-semibold text-gray-800 leading-tight mb-2">${res.text}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] uppercase font-bold text-gray-400 tracking-wider">Required: ${res.category.replace('-', ' ')}</span>
                        <span class="font-bold text-[11px] ${res.isCorrect ? 'text-green-600' : 'text-red-600'}">
                            ${res.isCorrect ? 'CORRECT ✓' : 'INCORRECT ✕'}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
