<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report or Not?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Helvetica font stack as requested */
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #f6f5f8; /* Updated background colour */
            color: #413659;
            touch-action: manipulation;
        }

        .drop-zone {
            transition: all 0.3s ease;
            min-height: 140px; /* Compact height */
        }

        .drop-zone.drag-over {
            background-color: #C6B4D9;
            border-style: solid;
            transform: scale(1.01);
        }

        .scenario-card {
            cursor: grab;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-size: 0.95rem;
        }

        .scenario-card:active {
            cursor: grabbing;
        }

        .scenario-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
        }

        .incorrect {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
        }

        /* Touch interaction styling */
        .selected-card {
            ring: 3px solid #513873;
            transform: scale(1.03);
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-6">
            <!-- Simplified Heading -->
            <h1 class="text-2xl font-bold text-[#513873] mb-1">Report or Not?</h1>
            <p class="text-sm text-[#413659]">Drag each scenario into the correct box. (Mobile: Tap scenario, then tap box).</p>
        </header>

        <!-- Scenarios Pool -->
        <div id="scenarios-pool" class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
            <!-- Scenarios injected here -->
        </div>

        <!-- Target Zones -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Report Required -->
            <div id="zone-report" class="drop-zone border-4 border-dashed border-[#513873] rounded-xl p-4 flex flex-col items-center bg-white shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="bg-[#513873] text-white px-3 py-0.5 rounded-full text-xs font-bold mb-3 uppercase tracking-wider">Report Required</div>
                <div class="zone-content w-full flex flex-col gap-2"></div>
            </div>

            <!-- No Report Required -->
            <div id="zone-no-report" class="drop-zone border-4 border-dashed border-[#9C7F9D] rounded-xl p-4 flex flex-col items-center bg-white shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="bg-[#9C7F9D] text-white px-3 py-0.5 rounded-full text-xs font-bold mb-3 uppercase tracking-wider">No Report Needed</div>
                <div class="zone-content w-full flex flex-col gap-2"></div>
            </div>
        </div>

        <!-- Feedback & Reset -->
        <div class="mt-6 text-center">
            <div id="feedback-message" class="text-lg font-bold mb-4 min-h-[24px]"></div>
            <button onclick="resetActivity()" class="bg-[#413659] hover:bg-[#513873] text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-md text-sm">
                Reset Activity
            </button>
        </div>
    </div>

    <script>
        const scenarios = [
            { id: 1, text: "A family member makes threats at the workplace counter.", category: "report" },
            { id: 2, text: "An employee asks for 10 days of paid domestic violence leave.", category: "report" },
            { id: 3, text: "Abusive text messages are sent to a work phone.", category: "report" },
            { id: 4, text: "A colleague says they are 'having a hard time' (no risks).", category: "no-report" },
            { id: 5, text: "You hear a rumour that someone is experiencing violence.", category: "no-report" },
            { id: 6, text: "Staff member talks about a past event that is resolved.", category: "no-report" }
        ];

        let selectedCard = null;

        function init() {
            const pool = document.getElementById('scenarios-pool');
            pool.innerHTML = '';
            const shuffled = [...scenarios].sort(() => Math.random() - 0.5);

            shuffled.forEach(s => {
                const card = document.createElement('div');
                card.id = `card-${s.id}`;
                card.className = "scenario-card bg-white p-3 rounded-lg shadow border border-gray-100 text-center font-medium select-none";
                card.draggable = true;
                card.innerText = s.text;
                card.dataset.category = s.category;
                
                card.addEventListener('dragstart', dragStart);
                card.addEventListener('dragend', dragEnd);
                card.addEventListener('click', () => handleCardClick(card));
                pool.appendChild(card);
            });

            document.querySelectorAll('.zone-content').forEach(z => z.innerHTML = '');
            document.getElementById('feedback-message').innerText = '';
        }

        function handleCardClick(card) {
            if (selectedCard) selectedCard.classList.remove('selected-card');
            if (selectedCard === card) {
                selectedCard = null;
            } else {
                selectedCard = card;
                card.classList.add('selected-card');
            }
        }

        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('click', () => {
                if (selectedCard) {
                    const zoneId = zone.id === 'zone-report' ? 'report' : 'no-report';
                    processDrop(selectedCard, zoneId);
                    selectedCard.classList.remove('selected-card');
                    selectedCard = null;
                }
            });
        });

        function dragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.id);
            setTimeout(() => e.target.classList.add('dragging'), 0);
        }

        function dragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function allowDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function dragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function drop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const cardId = e.dataTransfer.getData('text/plain');
            const card = document.getElementById(cardId);
            const zoneId = e.currentTarget.id === 'zone-report' ? 'report' : 'no-report';
            processDrop(card, zoneId);
        }

        function processDrop(card, zoneId) {
            const correctCategory = card.dataset.category;
            const targetZone = zoneId === 'report' ? document.getElementById('zone-report') : document.getElementById('zone-no-report');
            const zoneContent = targetZone.querySelector('.zone-content');

            zoneContent.appendChild(card);
            card.draggable = false;
            card.onclick = null;
            card.className = "scenario-card p-2 rounded-lg border-2 text-center text-xs font-medium w-full mb-1";

            if (zoneId === correctCategory) {
                card.classList.add('correct');
                showFeedback("Correct!", "text-green-600");
            } else {
                card.classList.add('incorrect');
                showFeedback("Incorrect.", "text-red-600");
            }
            checkCompletion();
        }

        function showFeedback(msg, colorClass) {
            const fb = document.getElementById('feedback-message');
            fb.innerText = msg;
            fb.className = `text-lg font-bold mb-4 min-h-[24px] ${colorClass}`;
            setTimeout(() => { if (fb.innerText === msg) fb.innerText = ''; }, 1500);
        }

        function checkCompletion() {
            const remaining = document.getElementById('scenarios-pool').children.length;
            if (remaining === 0) {
                const incorrect = document.querySelectorAll('.incorrect').length;
                const fb = document.getElementById('feedback-message');
                if (incorrect === 0) {
                    fb.innerText = "Excellent! All scenarios correctly sorted.";
                    fb.className = "text-lg font-bold mb-4 text-[#513873]";
                } else {
                    fb.innerText = `Finished! You got ${scenarios.length - incorrect} / ${scenarios.length} correct.`;
                    fb.className = "text-lg font-bold mb-4 text-[#413659]";
                }
            }
        }

        function resetActivity() { init(); }
        window.onload = init;
    </script>
</body>
</html>
