<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Report or Not?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #513873;
            --secondary: #9C7F9D;
            --success: #22c55e;
            --error: #ef4444;
            --bg-light: #f6f5f8;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            color: #413659;
            overscroll-behavior-y: contain;
            overflow-x: hidden;
        }

        /* Desktop Drag & Drop Styles */
        .drop-zone { transition: all 0.3s ease; min-height: 160px; }
        .drop-zone.drag-over { background-color: #C6B4D9; transform: scale(1.02); border-style: solid; }

        /* Mobile Card Stack Styles */
        #mobile-stack-container {
            position: relative;
            height: 300px;
            width: 100%;
            display: none;
        }

        @media (max-width: 767px) {
            #desktop-pool { display: none; }
            #mobile-stack-container { display: flex; justify-content: center; }
            .desktop-only-text { display: none; }
        }

        .swipe-card {
            position: absolute;
            width: 100%;
            max-width: 320px;
            height: 200px;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            font-weight: 600;
            touch-action: none;
            user-select: none;
            cursor: grab;
            border: 2px solid #e5e7eb;
            transition: background-color 0.2s ease;
        }

        .swipe-card:active { cursor: grabbing; }

        /* Summary View helpers */
        .summary-item { border-left: 4px solid transparent; }
        .summary-item.correct { border-left-color: var(--success); }
        .summary-item.incorrect { border-left-color: var(--error); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="game-container" class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-[#513873] mb-2">Report or Not?</h1>
            <p class="text-gray-600">
                <span class="desktop-only-text">Drag the cards into the correct reporting category.</span>
                <span class="md:hidden">Swipe <b>Left</b> for No Report, <b>Right</b> for Report Required.</span>
            </p>
        </header>

        <div id="desktop-pool" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10"></div>

        <div id="mobile-stack-container" class="mb-10">
            <div id="card-stack" class="relative w-full flex justify-center">
                </div>
        </div>

        <div class="grid grid-cols-2 gap-4 md:gap-8">
            <div id="zone-no-report" class="drop-zone border-4 border-dashed border-[#9C7F9D] rounded-2xl p-4 flex flex-col items-center bg-white shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="bg-[#9C7F9D] text-white px-4 py-1 rounded-full text-xs font-bold mb-4 uppercase tracking-widest">No Report</div>
                <div class="zone-content w-full flex flex-col gap-2 hidden md:flex"></div>
            </div>

            <div id="zone-report" class="drop-zone border-4 border-dashed border-[#513873] rounded-2xl p-4 flex flex-col items-center bg-white shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="bg-[#513873] text-white px-4 py-1 rounded-full text-xs font-bold mb-4 uppercase tracking-widest">Report Required</div>
                <div class="zone-content w-full flex flex-col gap-2 hidden md:flex"></div>
            </div>
        </div>
    </div>

    <div id="summary-view" class="max-w-2xl mx-auto hidden bg-white p-8 rounded-3xl shadow-xl">
        <h2 class="text-2xl font-bold text-center mb-6">Activity Results</h2>
        <div id="results-list" class="space-y-4 mb-8"></div>
        <div class="text-center">
            <button onclick="location.reload()" class="bg-[#513873] text-white px-8 py-3 rounded-xl font-bold hover:opacity-90">Try Again</button>
        </div>
    </div>

    <script>
        const scenarios = [
            { id: 1, text: "A family member makes threats at the workplace counter.", category: "report" },
            { id: 2, text: "An employee asks for 10 days of paid domestic violence leave.", category: "report" },
            { id: 3, text: "Abusive text messages are sent to a work phone.", category: "report" },
            { id: 4, text: "A colleague says they are 'having a hard time' (no risks).", category: "no-report" },
            { id: 5, text: "You hear a rumour that someone is experiencing violence.", category: "no-report" },
            { id: 6, text: "Staff member talks about a past event that is resolved.", category: "no-report" }
        ];

        let results = [];
        let currentStack = [];

        function init() {
            const pool = document.getElementById('desktop-pool');
            const stack = document.getElementById('card-stack');
            pool.innerHTML = '';
            stack.innerHTML = '';
            results = [];
            currentStack = [...scenarios].sort(() => Math.random() - 0.5);

            currentStack.forEach((s, index) => {
                // Create Desktop Card
                const dCard = document.createElement('div');
                dCard.id = `desktop-card-${s.id}`;
                dCard.className = "bg-white p-4 rounded-xl shadow border border-gray-200 text-center font-medium cursor-grab active:cursor-grabbing";
                dCard.draggable = true;
                dCard.innerText = s.text;
                dCard.dataset.id = s.id;
                dCard.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', s.id));
                pool.appendChild(dCard);

                // Create Mobile Card
                const mCard = document.createElement('div');
                mCard.className = "swipe-card";
                mCard.id = `mobile-card-${s.id}`;
                mCard.innerText = s.text;
                mCard.style.zIndex = scenarios.length - index;
                stack.appendChild(mCard);
                setupSwipe(mCard, s);
            });
        }

        // --- DESKTOP LOGIC ---
        function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function drop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const scenarioId = e.dataTransfer.getData('text/plain');
            const zoneType = e.currentTarget.id === 'zone-report' ? 'report' : 'no-report';
            handlePlacement(parseInt(scenarioId), zoneType);
        }

        // --- MOBILE SWIPE LOGIC ---
        function setupSwipe(el, data) {
            let startX = 0, currentX = 0, isDragging = false;
            
            el.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                isDragging = true;
                el.style.transition = 'none';
            });

            el.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                currentX = e.touches[0].clientX - startX;
                const rotation = currentX / 15;
                el.style.transform = `translateX(${currentX}px) rotate(${rotation}deg)`;
                
                // Color Feedback
                if (currentX > 50) el.style.backgroundColor = '#dcfce7'; // Green (Right)
                else if (currentX < -50) el.style.backgroundColor = '#fee2e2'; // Red (Left)
                else el.style.backgroundColor = 'white';
            });

            el.addEventListener('touchend', () => {
                isDragging = false;
                if (Math.abs(currentX) > 100) {
                    const direction = currentX > 0 ? 'report' : 'no-report';
                    el.style.transition = 'transform 0.5s ease-in';
                    el.style.transform = `translateX(${currentX * 5}px) rotate(${currentX / 10}deg)`;
                    setTimeout(() => el.remove(), 200);
                    handlePlacement(data.id, direction);
                } else {
                    el.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    el.style.transform = `translateX(0) rotate(0)`;
                    el.style.backgroundColor = 'white';
                }
                currentX = 0;
            });
        }

        // --- CORE LOGIC ---
        function handlePlacement(id, userChoice) {
            const scenario = scenarios.find(s => s.id === id);
            const isCorrect = scenario.category === userChoice;
            
            results.push({ ...scenario, userChoice, isCorrect });

            // Remove from desktop pool if it exists
            const dCard = document.getElementById(`desktop-card-${id}`);
            if (dCard) dCard.remove();

            if (results.length === scenarios.length) {
                showSummary();
            }
        }

        function showSummary() {
            document.getElementById('game-container').classList.add('hidden');
            const view = document.getElementById('summary-view');
            const list = document.getElementById('results-list');
            view.classList.remove('hidden');

            list.innerHTML = results.map(res => `
                <div class="summary-item ${res.isCorrect ? 'correct bg-green-50' : 'incorrect bg-red-50'} p-4 rounded-lg shadow-sm">
                    <div class="flex justify-between items-start">
                        <p class="font-medium text-sm text-gray-800">${res.text}</p>
                        <span class="text-xs font-bold uppercase tracking-tighter ${res.isCorrect ? 'text-green-600' : 'text-red-600'}">
                            ${res.isCorrect ? '✓ Correct' : '✕ Incorrect'}
                        </span>
                    </div>
                    <p class="text-xs mt-2 text-gray-500">Category: <span class="capitalize">${res.category.replace('-', ' ')}</span></p>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
